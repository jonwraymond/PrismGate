<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B21A8" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#6B21A8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6B21A8" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowEmerald" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRose" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Prism body - compact, right-pointing triangle -->
  <polygon points="7,4 22,16 7,28" fill="url(#prismGrad)" stroke="#6B21A8" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Prism inner highlight -->
  <polygon points="7,4 22,16 7,16" fill="#A78BFA" fill-opacity="0.08"/>

  <!-- Internal refraction lines -->
  <line x1="7" y1="12" x2="16" y2="11" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="0.8"/>
  <line x1="7" y1="20" x2="16" y2="21" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="0.8"/>

  <!-- Exit glow -->
  <ellipse cx="17" cy="16" rx="1.5" ry="7" fill="#FFFFFF" fill-opacity="0.1"/>

  <!-- Cyan ray - top -->
  <line x1="18" y1="11" x2="30" y2="3" stroke="#06B6D4" stroke-width="3.5" stroke-linecap="round" filter="url(#glowCyan)"/>
  <line x1="18" y1="11" x2="30" y2="3" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Emerald ray -->
  <line x1="18" y1="14" x2="30" y2="9" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" filter="url(#glowEmerald)"/>
  <line x1="18" y1="14" x2="30" y2="9" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Amber ray -->
  <line x1="18" y1="18" x2="30" y2="16" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round" filter="url(#glowAmber)"/>
  <line x1="18" y1="18" x2="30" y2="16" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Rose ray - bottom -->
  <line x1="18" y1="21" x2="30" y2="25" stroke="#F43F5E" stroke-width="3.5" stroke-linecap="round" filter="url(#glowRose)"/>
  <line x1="18" y1="21" x2="30" y2="25" stroke="#F43F5E" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Sparkle tips -->
  <circle cx="30" cy="3" r="1" fill="#06B6D4" fill-opacity="0.7"/>
  <circle cx="30" cy="9" r="0.8" fill="#10B981" fill-opacity="0.7"/>
  <circle cx="30" cy="16" r="0.7" fill="#F59E0B" fill-opacity="0.7"/>
  <circle cx="30" cy="25" r="1" fill="#F43F5E" fill-opacity="0.7"/>
</svg>