<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Beam gradient: white fading toward prism -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="85%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Prism fill: light violet translucent -->
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Prism stroke glow -->
    <filter id="prismGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>

    <!-- Ray glow filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRose" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Incoming light beam - enters from left -->
  <polygon points="0,240 0,272 190,200 190,312" fill="url(#beamGrad)"/>

  <!-- Prism - right-pointing isosceles triangle -->
  <polygon points="190,155 330,256 190,357" fill="url(#prismGrad)" stroke="#A78BFA" stroke-width="3" stroke-linejoin="round"/>

  <!-- Prism inner highlight (top facet reflection) -->
  <polygon points="190,155 330,256 190,256" fill="#C4B5FD" fill-opacity="0.10"/>

  <!-- Internal refraction paths -->
  <line x1="190" y1="240" x2="270" y2="232" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="190" y1="272" x2="270" y2="280" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Exit point glow on prism right face -->
  <ellipse cx="270" cy="256" rx="4" ry="28" fill="#FFFFFF" fill-opacity="0.10"/>

  <!-- Cyan ray - Tool discovery -->
  <line x1="270" y1="232" x2="490" y2="110" stroke="#22D3EE" stroke-width="10" stroke-linecap="round" filter="url(#glowCyan)"/>
  <line x1="270" y1="232" x2="490" y2="110" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Emerald ray - Session isolation -->
  <line x1="270" y1="248" x2="490" y2="180" stroke="#34D399" stroke-width="10" stroke-linecap="round" filter="url(#glowEmerald)"/>
  <line x1="270" y1="248" x2="490" y2="180" stroke="#34D399" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Amber ray - Secrets management -->
  <line x1="270" y1="264" x2="490" y2="256" stroke="#FBBF24" stroke-width="10" stroke-linecap="round" filter="url(#glowAmber)"/>
  <line x1="270" y1="264" x2="490" y2="256" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Rose ray - Health monitoring -->
  <line x1="270" y1="280" x2="490" y2="340" stroke="#FB7185" stroke-width="10" stroke-linecap="round" filter="url(#glowRose)"/>
  <line x1="270" y1="280" x2="490" y2="340" stroke="#FB7185" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Sparkle particles at ray tips -->
  <circle cx="492" cy="108" r="3" fill="#22D3EE" fill-opacity="0.8"/>
  <circle cx="492" cy="178" r="2.5" fill="#34D399" fill-opacity="0.8"/>
  <circle cx="492" cy="254" r="2" fill="#FBBF24" fill-opacity="0.8"/>
  <circle cx="492" cy="342" r="3" fill="#FB7185" fill-opacity="0.8"/>

  <!-- Small sparkle dots along rays -->
  <circle cx="380" cy="170" r="1.5" fill="#22D3EE" fill-opacity="0.5"/>
  <circle cx="420" cy="200" r="1.5" fill="#34D399" fill-opacity="0.5"/>
  <circle cx="400" cy="260" r="1.5" fill="#FBBF24" fill-opacity="0.5"/>
  <circle cx="410" cy="310" r="1.5" fill="#FB7185" fill-opacity="0.5"/>
</svg>